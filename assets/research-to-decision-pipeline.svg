<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Applied AI Research Translator diagram">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #475569; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 16; }
      .box-blue { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.8; rx: 16; }
      .box-green { fill: #ecfdf5; stroke: #10b981; stroke-width: 1.8; rx: 16; }
      .box-amber { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.8; rx: 16; }
      .box-red { fill: #fef2f2; stroke: #ef4444; stroke-width: 1.8; rx: 16; }
      .box-purple { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 1.8; rx: 16; }
      .line { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line-dash { stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .zone { fill: rgba(226,232,240,0.65); stroke: #cbd5e1; stroke-width: 1.2; rx: 22; }
      .footer { font: 400 12px Arial, sans-serif; fill: #64748b; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="720" />

<text x="60" y="70" class="title">
<tspan x="60" dy="0">Research-to-Decision Pipeline</tspan>
</text>
<text x="60" y="102" class="subtitle">
<tspan x="60" dy="0">A governed path from external research material to audit-ready decision record.</tspan>
</text>

<rect class="box" x="60" y="160" width="150" height="110" />
<text x="78" y="192" class="label">
<tspan x="78" dy="0">Source</tspan>
</text>
<text x="78" y="218" class="small">
<tspan x="78" dy="0">Paper\nPDF\nReport\nRepository</tspan>
</text>
<rect class="box-blue" x="250" y="160" width="150" height="110" />
<text x="268" y="192" class="label">
<tspan x="268" dy="0">Claims</tspan>
</text>
<text x="268" y="218" class="small">
<tspan x="268" dy="0">Falsifiable\nScoped\nEvidence-linked</tspan>
</text>
<rect class="box-blue" x="440" y="160" width="150" height="110" />
<text x="458" y="192" class="label">
<tspan x="458" dy="0">Tasks</tspan>
</text>
<text x="458" y="218" class="small">
<tspan x="458" dy="0">Bounded\nInputs\nOutputs</tspan>
</text>
<rect class="box-purple" x="630" y="160" width="150" height="110" />
<text x="648" y="192" class="label">
<tspan x="648" dy="0">Evaluation</tspan>
</text>
<text x="648" y="218" class="small">
<tspan x="648" dy="0">Criteria\nFailure states\nAbstention</tspan>
</text>
<rect class="box-amber" x="820" y="160" width="150" height="110" />
<text x="838" y="192" class="label">
<tspan x="838" dy="0">Run / Review</tspan>
</text>
<text x="838" y="218" class="small">
<tspan x="838" dy="0">Candidate\nEvidence\nValidation</tspan>
</text>
<rect class="box-green" x="1010" y="160" width="150" height="110" />
<text x="1028" y="192" class="label">
<tspan x="1028" dy="0">Decision</tspan>
</text>
<text x="1028" y="218" class="small">
<tspan x="1028" dy="0">Human gate\nRationale\nSummary</tspan>
</text>

<path class="line" d="M210 215 H250" />
<path class="line" d="M400 215 H440" />
<path class="line" d="M590 215 H630" />
<path class="line" d="M780 215 H820" />
<path class="line" d="M970 215 H1010" />

<rect class="zone" x="60" y="350" width="1100" height="210" />
<text x="90" y="395" class="label">
<tspan x="90" dy="0">Governance controls applied across the chain</tspan>
</text>
<text x="90" y="430" class="small">
<tspan x="90" dy="0">Provenance: preserve source material, version, citation, and retrieval context</tspan>
</text>
<text x="90" y="460" class="small">
<tspan x="90" dy="0">Containment: convert only bounded, testable claims into task definitions</tspan>
</text>
<text x="90" y="490" class="small">
<tspan x="90" dy="0">Abstention: stop when evidence, schema, evaluation, or review conditions fail</tspan>
</text>
<text x="90" y="520" class="small">
<tspan x="90" dy="0">Authority: model output remains evidence until human accept, override, or reject</tspan>
</text>

<text x="60" y="660" class="footer">
<tspan x="60" dy="0">Applied AI Research Translator, visual asset for v1.1 archival release</tspan>
</text>
</svg>
