<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-label="Artifact Traceability Map">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 52px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 24px Arial, sans-serif; fill: #475569; }
      .section { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 18px Arial, sans-serif; fill: #334155; }
      .small { font: 400 16px Arial, sans-serif; fill: #475569; }
      .footer { font: 400 16px Arial, sans-serif; fill: #64748b; }

      .neutral { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .blue { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2.4; }
      .purple { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2.4; }
      .amber { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2.4; }
      .green { fill: #ecfdf5; stroke: #10b981; stroke-width: 2.4; }
      .red { fill: #fef2f2; stroke: #ef4444; stroke-width: 2.4; }
      .caption { fill: #eef2f7; stroke: #cbd5e1; stroke-width: 1.5; }
      .zone { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; }

      .line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .lineSoft { stroke: #94a3b8; stroke-width: 2.4; fill: none; marker-end: url(#arrowSoft); }
      .dash { stroke: #64748b; stroke-width: 3; stroke-dasharray: 10 10; fill: none; marker-end: url(#arrow); }
      .boundary { stroke: #0f172a; stroke-width: 2.5; stroke-dasharray: 10 10; fill: none; }
    </style>

    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L11,7 L2,12 Z" fill="#64748b" />
    </marker>
    <marker id="arrowSoft" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L11,7 L2,12 Z" fill="#94a3b8" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1600" height="960" />
<text x="80" y="100" class="title">
<tspan x="80" dy="0">Artifact Traceability Map</tspan>
</text><text x="80" y="148" class="subtitle">
<tspan x="80" dy="0">Every downstream decision should point back to source material, claims, tasks, and review artifacts.</tspan>
</text>
    <rect x="90" y="220" width="300" height="130" rx="20" class="neutral" />
    <text x="112" y="262" class="label">
<tspan x="112" dy="0">sources/paper_text.txt</tspan>
</text>
    <text x="112" y="298" class="body">
<tspan x="112" dy="0">Source material preserved</tspan>
<tspan x="112" dy="22">for later inspection</tspan>
</text>
    
    <rect x="470" y="220" width="300" height="130" rx="20" class="blue" />
    <text x="492" y="262" class="label">
<tspan x="492" dy="0">claims.json</tspan>
</text>
    <text x="492" y="298" class="body">
<tspan x="492" dy="0">Research claims extracted</tspan>
<tspan x="492" dy="22">with scope and evidence</tspan>
</text>
    
    <rect x="850" y="220" width="300" height="130" rx="20" class="blue" />
    <text x="872" y="262" class="label">
<tspan x="872" dy="0">tasks.json</tspan>
</text>
    <text x="872" y="298" class="body">
<tspan x="872" dy="0">Bounded tasks derived</tspan>
<tspan x="872" dy="22">from selected claims</tspan>
</text>
    
    <rect x="1230" y="220" width="280" height="130" rx="20" class="purple" />
    <text x="1252" y="262" class="label">
<tspan x="1252" dy="0">eval_plan.json</tspan>
</text>
    <text x="1252" y="298" class="body">
<tspan x="1252" dy="0">Criteria declared</tspan>
<tspan x="1252" dy="22">before judgment</tspan>
</text>
    <path class="line" d="M390 285 H470" />
<path class="line" d="M770 285 H850" />
<path class="line" d="M1150 285 H1230" />
<rect x="90" y="410" width="620" height="70" rx="18" class="caption" />
<text x="120" y="453" class="section">
<tspan x="120" dy="0">Audit question: how did this source become this decision?</tspan>
</text>
    <rect x="270" y="545" width="310" height="130" rx="20" class="neutral" />
    <text x="292" y="587" class="label">
<tspan x="292" dy="0">run_input.json</tspan>
</text>
    <text x="292" y="623" class="body">
<tspan x="292" dy="0">Execution context</tspan>
<tspan x="292" dy="22">recorded</tspan>
</text>
    
    <rect x="660" y="545" width="310" height="130" rx="20" class="amber" />
    <text x="682" y="587" class="label">
<tspan x="682" dy="0">run_output.json</tspan>
</text>
    <text x="682" y="623" class="body">
<tspan x="682" dy="0">System output</tspan>
<tspan x="682" dy="22">remains intermediate</tspan>
</text>
    
    <rect x="1050" y="545" width="340" height="130" rx="20" class="green" />
    <text x="1072" y="587" class="label">
<tspan x="1072" dy="0">human_gate.json</tspan>
</text>
    <text x="1072" y="623" class="body">
<tspan x="1072" dy="0">Reviewer decision:</tspan>
<tspan x="1072" dy="22">accept, override, reject</tspan>
</text>
    <path class="line" d="M1050 610 H970" />
<path class="line" d="M660 610 H580" />
<path class="lineSoft" d="M1410 350 C1410 460 1335 500 1220 545" />

    <rect x="590" y="760" width="430" height="130" rx="20" class="green" />
    <text x="612" y="802" class="label">
<tspan x="612" dy="0">decision_summary.json</tspan>
</text>
    <text x="612" y="838" class="body">
<tspan x="612" dy="0">Final audit-facing decision record:</tspan>
<tspan x="612" dy="22">rationale, confidence, limits</tspan>
</text>
    <path class="line" d="M815 675 C815 720 815 730 815 760" />
<path class="line" d="M1220 675 C1220 745 1050 745 980 760" />
<path class="dash" d="M240 350 C240 630 410 715 650 760" />
<rect x="940" y="405" width="570" height="76" rx="18" class="caption" />
<text x="970" y="437" class="body">
<tspan x="970" dy="0">Solid arrows show governed artifact flow.</tspan>
<tspan x="970" dy="24">Dashed arrow shows reconstructability back to source.</tspan>
</text><text x="90" y="925" class="footer">
<tspan x="90" dy="0">Applied AI Research Translator, visual asset for v1.1 archival release</tspan>
</text></svg>
