<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Applied AI Research Translator diagram">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #475569; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 16; }
      .box-blue { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.8; rx: 16; }
      .box-green { fill: #ecfdf5; stroke: #10b981; stroke-width: 1.8; rx: 16; }
      .box-amber { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.8; rx: 16; }
      .box-red { fill: #fef2f2; stroke: #ef4444; stroke-width: 1.8; rx: 16; }
      .box-purple { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 1.8; rx: 16; }
      .line { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line-dash { stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .zone { fill: rgba(226,232,240,0.65); stroke: #cbd5e1; stroke-width: 1.2; rx: 22; }
      .footer { font: 400 12px Arial, sans-serif; fill: #64748b; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="720" />

<text x="60" y="70" class="title">
<tspan x="60" dy="0">Artifact Traceability Map</tspan>
</text>
<text x="60" y="102" class="subtitle">
<tspan x="60" dy="0">Every downstream decision should point back to source material, claims, tasks, and review artifacts.</tspan>
</text>

<rect class="box" x="70" y="160" width="230" height="90" />
<text x="88" y="192" class="label">
<tspan x="88" dy="0">sources/paper_text.txt</tspan>
</text>
<text x="88" y="218" class="small">
<tspan x="88" dy="0">Source material preserved\nfor later inspection</tspan>
</text>
<rect class="box-blue" x="360" y="160" width="230" height="90" />
<text x="378" y="192" class="label">
<tspan x="378" dy="0">claims.json</tspan>
</text>
<text x="378" y="218" class="small">
<tspan x="378" dy="0">Research claims extracted\nwith scope and evidence</tspan>
</text>
<rect class="box-blue" x="650" y="160" width="230" height="90" />
<text x="668" y="192" class="label">
<tspan x="668" dy="0">tasks.json</tspan>
</text>
<text x="668" y="218" class="small">
<tspan x="668" dy="0">Bounded tasks derived\nfrom selected claims</tspan>
</text>
<rect class="box-purple" x="940" y="160" width="210" height="90" />
<text x="958" y="192" class="label">
<tspan x="958" dy="0">eval_plan.json</tspan>
</text>
<text x="958" y="218" class="small">
<tspan x="958" dy="0">Criteria declared\nbefore judgment</tspan>
</text>

<rect class="box" x="220" y="360" width="230" height="90" />
<text x="238" y="392" class="label">
<tspan x="238" dy="0">run_input.json</tspan>
</text>
<text x="238" y="418" class="small">
<tspan x="238" dy="0">Execution context\nrecorded</tspan>
</text>
<rect class="box-amber" x="510" y="360" width="230" height="90" />
<text x="528" y="392" class="label">
<tspan x="528" dy="0">run_output.json</tspan>
</text>
<text x="528" y="418" class="small">
<tspan x="528" dy="0">System output\nremains intermediate</tspan>
</text>
<rect class="box-green" x="800" y="360" width="230" height="90" />
<text x="818" y="392" class="label">
<tspan x="818" dy="0">human_gate.json</tspan>
</text>
<text x="818" y="418" class="small">
<tspan x="818" dy="0">Reviewer decision\naccept, override, reject</tspan>
</text>

<rect class="box-green" x="450" y="560" width="300" height="90" />
<text x="468" y="592" class="label">
<tspan x="468" dy="0">decision_summary.json</tspan>
</text>
<text x="468" y="618" class="small">
<tspan x="468" dy="0">Final audit-facing decision record\nrationale, confidence, limits</tspan>
</text>

<path class="line" d="M300 205 H360" />
<path class="line" d="M590 205 H650" />
<path class="line" d="M880 205 H940" />
<path class="line" d="M1045 250 C1045 315 995 320 915 360" />
<path class="line" d="M800 405 H740" />
<path class="line" d="M510 405 H450" />
<path class="line" d="M565 450 C565 500 585 515 600 560" />
<path class="line" d="M915 450 C915 520 750 515 675 560" />
<path class="line-dash" d="M185 250 C185 520 390 520 500 560" />

<text x="70" y="315" class="label">
<tspan x="70" dy="0">Audit question: how did this source become this decision?</tspan>
</text>
<text x="70" y="690" class="footer">
<tspan x="70" dy="0">Applied AI Research Translator, visual asset for v1.1 archival release</tspan>
</text>
</svg>
