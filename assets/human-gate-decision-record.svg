<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Applied AI Research Translator diagram">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #475569; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 16; }
      .box-blue { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.8; rx: 16; }
      .box-green { fill: #ecfdf5; stroke: #10b981; stroke-width: 1.8; rx: 16; }
      .box-amber { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.8; rx: 16; }
      .box-red { fill: #fef2f2; stroke: #ef4444; stroke-width: 1.8; rx: 16; }
      .box-purple { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 1.8; rx: 16; }
      .line { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line-dash { stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .zone { fill: rgba(226,232,240,0.65); stroke: #cbd5e1; stroke-width: 1.2; rx: 22; }
      .footer { font: 400 12px Arial, sans-serif; fill: #64748b; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="720" />

<text x="60" y="70" class="title">
<tspan x="60" dy="0">Human-Gate Decision Record</tspan>
</text>
<text x="60" y="102" class="subtitle">
<tspan x="60" dy="0">The reviewer converts proposed evidence into an authorized outcome or stops the workflow.</tspan>
</text>

<rect class="box-amber" x="80" y="160" width="250" height="100" />
<text x="98" y="192" class="label">
<tspan x="98" dy="0">Proposed Output</tspan>
</text>
<text x="98" y="218" class="small">
<tspan x="98" dy="0">Candidate result\nvalidated against schema\nand task constraints</tspan>
</text>
<rect class="box-green" x="475" y="160" width="250" height="100" />
<text x="493" y="192" class="label">
<tspan x="493" dy="0">Human Gate</tspan>
</text>
<text x="493" y="218" class="small">
<tspan x="493" dy="0">Reviewer assesses evidence,\nscope, confidence, and\nauthority boundary</tspan>
</text>

<path class="line" d="M330 210 H475" />

<rect class="box-green" x="120" y="390" width="190" height="105" />
<text x="138" y="422" class="label">
<tspan x="138" dy="0">Accept</tspan>
</text>
<text x="138" y="448" class="small">
<tspan x="138" dy="0">Output becomes final\ninside recorded boundary</tspan>
</text>
<rect class="box-purple" x="365" y="390" width="190" height="105" />
<text x="383" y="422" class="label">
<tspan x="383" dy="0">Override</tspan>
</text>
<text x="383" y="448" class="small">
<tspan x="383" dy="0">Reviewer changes output\nand records reason</tspan>
</text>
<rect class="box-red" x="610" y="390" width="190" height="105" />
<text x="628" y="422" class="label">
<tspan x="628" dy="0">Reject</tspan>
</text>
<text x="628" y="448" class="small">
<tspan x="628" dy="0">Output fails evidence,\nscope, or authority test</tspan>
</text>
<rect class="box-amber" x="855" y="390" width="190" height="105" />
<text x="873" y="422" class="label">
<tspan x="873" dy="0">Abstain / Escalate</tspan>
</text>
<text x="873" y="448" class="small">
<tspan x="873" dy="0">Evidence or authority\nis insufficient</tspan>
</text>

<path class="line" d="M600 260 C600 335 215 335 215 390" />
<path class="line" d="M600 260 C600 335 460 335 460 390" />
<path class="line" d="M600 260 C600 335 705 335 705 390" />
<path class="line" d="M600 260 C600 335 950 335 950 390" />

<rect class="box" x="410" y="575" width="380" height="80" />
<text x="428" y="607" class="label">
<tspan x="428" dy="0">Decision Summary</tspan>
</text>
<text x="428" y="633" class="small">
<tspan x="428" dy="0">Final record: decision, rationale, confidence, conditions, limits</tspan>
</text>
<path class="line" d="M215 495 C215 560 410 555 500 575" />
<path class="line" d="M460 495 C460 548 520 552 555 575" />
<path class="line" d="M705 495 C705 548 675 552 640 575" />
<path class="line" d="M950 495 C950 560 790 555 700 575" />

<text x="60" y="690" class="footer">
<tspan x="60" dy="0">Applied AI Research Translator, visual asset for v1.1 archival release</tspan>
</text>
</svg>
