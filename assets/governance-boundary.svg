<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-label="Governance Boundary">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 52px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 24px Arial, sans-serif; fill: #475569; }
      .section { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 18px Arial, sans-serif; fill: #334155; }
      .small { font: 400 16px Arial, sans-serif; fill: #475569; }
      .footer { font: 400 16px Arial, sans-serif; fill: #64748b; }

      .neutral { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .blue { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2.4; }
      .purple { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2.4; }
      .amber { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2.4; }
      .green { fill: #ecfdf5; stroke: #10b981; stroke-width: 2.4; }
      .red { fill: #fef2f2; stroke: #ef4444; stroke-width: 2.4; }
      .caption { fill: #eef2f7; stroke: #cbd5e1; stroke-width: 1.5; }
      .zone { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; }

      .line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .lineSoft { stroke: #94a3b8; stroke-width: 2.4; fill: none; marker-end: url(#arrowSoft); }
      .dash { stroke: #64748b; stroke-width: 3; stroke-dasharray: 10 10; fill: none; marker-end: url(#arrow); }
      .boundary { stroke: #0f172a; stroke-width: 2.5; stroke-dasharray: 10 10; fill: none; }
    </style>

    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L11,7 L2,12 Z" fill="#64748b" />
    </marker>
    <marker id="arrowSoft" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L11,7 L2,12 Z" fill="#94a3b8" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1600" height="960" />
<text x="80" y="100" class="title">
<tspan x="80" dy="0">Governance Boundary</tspan>
</text><text x="80" y="148" class="subtitle">
<tspan x="80" dy="0">AI may generate evidence inside a bounded workflow. A human reviewer authorizes the decision.</tspan>
</text><rect x="80" y="220" width="620" height="520" rx="24" class="zone" />
<text x="110" y="260" class="section">
<tspan x="110" dy="0">Evidence Layer</tspan>
</text><text x="110" y="295" class="small">
<tspan x="110" dy="0">Machine-checkable artifacts generated or validated before final authorization.</tspan>
</text>
    <rect x="130" y="355" width="220" height="115" rx="20" class="blue" />
    <text x="152" y="397" class="label">
<tspan x="152" dy="0">AI Candidate</tspan>
</text>
    <text x="152" y="433" class="body">
<tspan x="152" dy="0">Structured output</tspan>
<tspan x="152" dy="22">under task constraints</tspan>
</text>
    
    <rect x="420" y="355" width="220" height="115" rx="20" class="purple" />
    <text x="442" y="397" class="label">
<tspan x="442" dy="0">Validation</tspan>
</text>
    <text x="442" y="433" class="body">
<tspan x="442" dy="0">Schema check</tspan>
<tspan x="442" dy="22">Evidence check</tspan>
</text>
    
    <rect x="275" y="545" width="220" height="115" rx="20" class="amber" />
    <text x="297" y="587" class="label">
<tspan x="297" dy="0">Proposed Output</tspan>
</text>
    <text x="297" y="623" class="body">
<tspan x="297" dy="0">Intermediate</tspan>
<tspan x="297" dy="22">review artifact</tspan>
</text>
    <path class="line" d="M350 412 H420" />
<path class="lineSoft" d="M530 470 C530 520 460 530 420 545" />
<path class="lineSoft" d="M240 470 C240 520 305 530 350 545" />
<path class="boundary" d="M780 190 V790" />
<text x="744" y="820" class="section">
<tspan x="744" dy="0">Boundary</tspan>
</text><rect x="860" y="220" width="660" height="520" rx="24" class="zone" />
<text x="890" y="260" class="section">
<tspan x="890" dy="0">Authority Layer</tspan>
</text><text x="890" y="295" class="small">
<tspan x="890" dy="0">Institutional judgment records accept, override, reject, or escalation decisions.</tspan>
</text>
    <rect x="930" y="355" width="250" height="115" rx="20" class="green" />
    <text x="952" y="397" class="label">
<tspan x="952" dy="0">Human Gate</tspan>
</text>
    <text x="952" y="433" class="body">
<tspan x="952" dy="0">Accept</tspan>
<tspan x="952" dy="22">Override</tspan>
<tspan x="952" dy="22">Reject</tspan>
</text>
    
    <rect x="1240" y="355" width="220" height="115" rx="20" class="green" />
    <text x="1262" y="397" class="label">
<tspan x="1262" dy="0">Decision Summary</tspan>
</text>
    <text x="1262" y="433" class="body">
<tspan x="1262" dy="0">Rationale</tspan>
<tspan x="1262" dy="22">Confidence</tspan>
<tspan x="1262" dy="22">Limits</tspan>
</text>
    
    <rect x="1060" y="545" width="250" height="115" rx="20" class="neutral" />
    <text x="1082" y="587" class="label">
<tspan x="1082" dy="0">Audit Record</tspan>
</text>
    <text x="1082" y="623" class="body">
<tspan x="1082" dy="0">Reconstructable</tspan>
<tspan x="1082" dy="22">source-to-decision path</tspan>
</text>
    <path class="line" d="M700 602 H930" />
<path class="line" d="M1180 412 H1240" />
<path class="lineSoft" d="M1350 470 C1350 520 1260 530 1210 545" />
<text x="80" y="925" class="footer">
<tspan x="80" dy="0">Applied AI Research Translator, visual asset for v1.1 archival release</tspan>
</text></svg>
