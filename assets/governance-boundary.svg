<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Applied AI Research Translator diagram">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #475569; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 16; }
      .box-blue { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.8; rx: 16; }
      .box-green { fill: #ecfdf5; stroke: #10b981; stroke-width: 1.8; rx: 16; }
      .box-amber { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.8; rx: 16; }
      .box-red { fill: #fef2f2; stroke: #ef4444; stroke-width: 1.8; rx: 16; }
      .box-purple { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 1.8; rx: 16; }
      .line { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line-dash { stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .zone { fill: rgba(226,232,240,0.65); stroke: #cbd5e1; stroke-width: 1.2; rx: 22; }
      .footer { font: 400 12px Arial, sans-serif; fill: #64748b; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="720" />

<text x="60" y="70" class="title">
<tspan x="60" dy="0">Governance Boundary</tspan>
</text>
<text x="60" y="102" class="subtitle">
<tspan x="60" dy="0">AI may generate evidence inside a bounded workflow. A human reviewer authorizes the decision.</tspan>
</text>

<rect class="zone" x="60" y="150" width="500" height="390" />
<text x="90" y="190" class="label">
<tspan x="90" dy="0">Evidence Layer</tspan>
</text>
<text x="90" y="220" class="small">
<tspan x="90" dy="0">Machine-checkable artifacts generated or validated before final decision.</tspan>
</text>

<rect class="box-blue" x="100" y="260" width="175" height="95" />
<text x="118" y="292" class="label">
<tspan x="118" dy="0">AI Candidate</tspan>
</text>
<text x="118" y="318" class="small">
<tspan x="118" dy="0">Structured output\nunder task constraints</tspan>
</text>
<rect class="box-purple" x="335" y="260" width="175" height="95" />
<text x="353" y="292" class="label">
<tspan x="353" dy="0">Validation</tspan>
</text>
<text x="353" y="318" class="small">
<tspan x="353" dy="0">Schema check\nevidence check</tspan>
</text>
<rect class="box-amber" x="215" y="405" width="180" height="95" />
<text x="233" y="437" class="label">
<tspan x="233" dy="0">Proposed Output</tspan>
</text>
<text x="233" y="463" class="small">
<tspan x="233" dy="0">Intermediate\nreview artifact</tspan>
</text>

<path class="line" d="M275 307 H335" />
<path class="line" d="M423 355 V405" />
<path class="line" d="M188 355 V405" />

<rect class="zone" x="640" y="150" width="500" height="390" />
<text x="670" y="190" class="label">
<tspan x="670" dy="0">Authority Layer</tspan>
</text>
<text x="670" y="220" class="small">
<tspan x="670" dy="0">Institutional judgment records final authorization, override, rejection, or abstention.</tspan>
</text>

<rect class="box-green" x="700" y="260" width="175" height="95" />
<text x="718" y="292" class="label">
<tspan x="718" dy="0">Human Gate</tspan>
</text>
<text x="718" y="318" class="small">
<tspan x="718" dy="0">Accept\nOverride\nReject</tspan>
</text>
<rect class="box-green" x="935" y="260" width="160" height="95" />
<text x="953" y="292" class="label">
<tspan x="953" dy="0">Decision Summary</tspan>
</text>
<text x="953" y="318" class="small">
<tspan x="953" dy="0">Rationale\nConfidence\nLimits</tspan>
</text>
<rect class="box" x="810" y="405" width="180" height="95" />
<text x="828" y="437" class="label">
<tspan x="828" dy="0">Audit Record</tspan>
</text>
<text x="828" y="463" class="small">
<tspan x="828" dy="0">Reconstructable\nsource-to-decision path</tspan>
</text>

<path class="line" d="M510 452 H700" />
<path class="line" d="M875 307 H935" />
<path class="line" d="M1015 355 V405" />
<path class="line-dash" d="M890 405 V355" />

<line x1="600" y1="135" x2="600" y2="575" stroke="#0f172a" stroke-width="2" stroke-dasharray="9 9"/>
<text x="575" y="610" class="label">
<tspan x="575" dy="0">Boundary: model output cannot become final without human authorization.</tspan>
</text>

<text x="60" y="660" class="footer">
<tspan x="60" dy="0">Applied AI Research Translator, visual asset for v1.1 archival release</tspan>
</text>
</svg>
