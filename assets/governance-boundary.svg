<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-label="Governance Boundary">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 54px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 24px Arial, sans-serif; fill: #475569; }
      .section { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 18px Arial, sans-serif; fill: #334155; }
      .small { font: 400 16px Arial, sans-serif; fill: #475569; }
      .footer { font: 400 16px Arial, sans-serif; fill: #64748b; }

      .neutral { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .blue { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2.5; }
      .purple { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2.5; }
      .amber { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2.5; }
      .green { fill: #ecfdf5; stroke: #10b981; stroke-width: 2.5; }
      .zone { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.6; }
      .boundary { stroke: #0f172a; stroke-width: 2.5; stroke-dasharray: 11 11; fill: none; }
      .line { stroke: #64748b; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
      .lineSoft { stroke: #94a3b8; stroke-width: 2.6; fill: none; marker-end: url(#arrowSoft); }
    </style>

    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L11,7 L2,12 Z" fill="#64748b" />
    </marker>

    <marker id="arrowSoft" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L11,7 L2,12 Z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980" />

  <text x="80" y="100" class="title">
<tspan x="80" dy="0">Governance Boundary</tspan>
</text>
  <text x="80" y="148" class="subtitle">
<tspan x="80" dy="0">AI may generate evidence inside a bounded workflow. A human reviewer authorizes the decision.</tspan>
</text>

  <!-- Evidence Layer -->
  <rect x="70" y="220" width="670" height="540" rx="28" class="zone" />
  <text x="100" y="262" class="section">
<tspan x="100" dy="0">Evidence Layer</tspan>
</text>
  <text x="100" y="298" class="small">
<tspan x="100" dy="0">Machine-checkable artifacts generated or validated</tspan>
<tspan x="100" dy="22">before final authorization.</tspan>
</text>

  
    <rect x="120" y="365" width="270" height="120" rx="22" class="blue" />
    <text x="144" y="407" class="label">
<tspan x="144" dy="0">AI Candidate</tspan>
</text>
    <text x="144" y="447" class="body">
<tspan x="144" dy="0">Structured output</tspan>
<tspan x="144" dy="24">under task constraints</tspan>
</text>
    
  
    <rect x="460" y="365" width="250" height="120" rx="22" class="purple" />
    <text x="484" y="407" class="label">
<tspan x="484" dy="0">Validation</tspan>
</text>
    <text x="484" y="447" class="body">
<tspan x="484" dy="0">Schema check</tspan>
<tspan x="484" dy="24">Evidence check</tspan>
</text>
    
  
    <rect x="275" y="575" width="280" height="120" rx="22" class="amber" />
    <text x="299" y="617" class="label">
<tspan x="299" dy="0">Proposed Output</tspan>
</text>
    <text x="299" y="657" class="body">
<tspan x="299" dy="0">Intermediate</tspan>
<tspan x="299" dy="24">review artifact</tspan>
</text>
    

  <path class="line" d="M390 425 H460" />
  <path class="lineSoft" d="M255 485 C255 535 330 548 385 575" />
  <path class="lineSoft" d="M585 485 C585 535 520 548 445 575" />

  <!-- Boundary -->
  <path class="boundary" d="M800 180 V810" />
  <text x="733" y="855" class="section">
<tspan x="733" dy="0">Boundary</tspan>
</text>

  <!-- Authority Layer -->
  <rect x="870" y="220" width="660" height="540" rx="28" class="zone" />
  <text x="900" y="262" class="section">
<tspan x="900" dy="0">Authority Layer</tspan>
</text>
  <text x="900" y="298" class="small">
<tspan x="900" dy="0">Institutional judgment records accept, override,</tspan>
<tspan x="900" dy="22">reject, and escalation decisions.</tspan>
</text>

  
    <rect x="950" y="355" width="300" height="150" rx="22" class="green" />
    <text x="974" y="397" class="label">
<tspan x="974" dy="0">Human Gate</tspan>
</text>
    <text x="974" y="441" class="body">
<tspan x="974" dy="0">Accept</tspan>
<tspan x="974" dy="26">Override</tspan>
<tspan x="974" dy="26">Reject</tspan>
</text>
    
  
    <rect x="1300" y="355" width="230" height="150" rx="22" class="green" />
    <text x="1324" y="397" class="label">
<tspan x="1324" dy="0">Decision Summary</tspan>
</text>
    <text x="1324" y="441" class="body">
<tspan x="1324" dy="0">Rationale</tspan>
<tspan x="1324" dy="26">Confidence</tspan>
<tspan x="1324" dy="26">Limits</tspan>
</text>
    
  
    <rect x="1085" y="600" width="260" height="120" rx="22" class="neutral" />
    <text x="1109" y="642" class="label">
<tspan x="1109" dy="0">Audit Record</tspan>
</text>
    <text x="1109" y="682" class="body">
<tspan x="1109" dy="0">Reconstructable</tspan>
<tspan x="1109" dy="24">source-to-decision path</tspan>
</text>
    

  <!-- Cross-boundary and authority arrows -->
  <path class="line" d="M555 635 H950" />
  <path class="line" d="M1250 430 H1300" />
  <path class="lineSoft" d="M1415 505 C1415 565 1360 575 1265 600" />
  <path class="lineSoft" d="M1100 505 C1100 555 1145 570 1180 600" />

  <text x="70" y="950" class="footer">
<tspan x="70" dy="0">Applied AI Research Translator, visual asset for v1.1 archival release</tspan>
</text>
</svg>
