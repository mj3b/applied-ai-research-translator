name: Validate governed artifacts

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Validate safety-policy intake files
        run: |
          find packs -name safety_policy_intake.json -print0 | while IFS= read -r -d '' file; do
            ./scripts/validate_safety_policy_intake.sh "$file"
          done

      - name: Validate existing pack artifacts
        run: |
          if [ -x ./scripts/validate_pack.sh ]; then
            ./scripts/validate_pack.sh packs/haic_reliance_review_59e257ff || true
            ./scripts/validate_pack.sh packs/multi_agent_failure_modes_e0228882 || true
          else
            echo "validate_pack.sh not found or not executable; skipping pack-level validation."
          fi
